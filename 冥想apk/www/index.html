<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1b1814">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>冥想</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1b1814; --bg-surface: #24201b; --bg-elevated: #2d2822;
    --accent: #c8a45c; --accent-glow: rgba(200, 164, 92, 0.12);
    --danger: #c47272; --text-primary: #e5ded5;
    --text-secondary: #9a9288; --text-muted: #5e5850;
  }
  body {
    background: #1b1814; color: var(--text-primary);
    font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex; justify-content: center; align-items: flex-start;
    min-height: 100vh; -webkit-font-smoothing: antialiased;
    -webkit-user-select: none; user-select: none;
  }
  .app {
    width: 100%; max-width: 480px; min-height: 100vh;
    display: flex; flex-direction: column; padding: 0 28px;
  }

  .nav { text-align: center; padding: 20px 0 12px; }
  .nav-title { font-size: 17px; font-weight: 500; letter-spacing: 0.06em; color: var(--text-primary); }

  .page { display: none; flex-direction: column; flex: 1; }
  .page.active { display: flex; }

  /* Mode Tabs */
  .mode-tabs {
    display: flex; background: var(--bg-surface); border-radius: 12px;
    padding: 3px; margin-bottom: 28px; gap: 2px;
  }
  .mode-tab {
    flex: 1; padding: 10px 0; text-align: center; font-size: 14px; font-weight: 600;
    color: var(--text-secondary); border: none; background: none;
    border-radius: 9px; cursor: pointer; transition: all 0.25s;
  }
  .mode-tab.active { background: var(--bg-elevated); color: var(--accent); }

  /* Ring */
  .ring-container { position: relative; width: 260px; height: 260px; margin: 0 auto 32px; }
  .ring-container svg { width: 100%; height: 100%; }
  .ring-track { fill: none; stroke: var(--bg-elevated); stroke-width: 3; }
  .ring-progress {
    fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round;
    transition: stroke-dashoffset 0.4s ease;
  }
  .timer-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; pointer-events: none; }
  .timer-time { font-size: 52px; font-weight: 500; color: var(--text-primary); letter-spacing: 0.04em; line-height: 1; }
  .timer-label { font-size: 12px; color: var(--text-secondary); margin-top: 6px; letter-spacing: 0.06em; }
  .timer-label.breath { font-size: 18px; color: var(--accent); }

  /* Audio indicator */
  .audio-ind { display: flex; align-items: center; justify-content: center; gap: 8px;
    font-size: 11px; color: var(--text-muted); margin-bottom: 20px; height: 20px; }
  .audio-ind.playing { color: var(--accent); }
  .audio-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); }
  .audio-ind.playing .audio-dot { background: var(--accent); animation: pulse 0.8s ease infinite; }
  @keyframes pulse { 0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.4)} }

  /* Presets */
  .preset-section { margin-bottom: 20px; }
  .preset-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .preset-btn {
    flex: 1; padding: 10px 6px; text-align: center; font-size: 13px; font-weight: 600;
    color: var(--text-secondary); background: var(--bg-surface);
    border: 1px solid transparent; border-radius: 12px; cursor: pointer; transition: all 0.2s;
  }
  .preset-btn.selected { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }
  .preset-custom { display: flex; align-items: center; gap: 8px; background: var(--bg-surface);
    border-radius: 12px; padding: 8px 16px; font-size: 13px; color: var(--text-muted); }
  .preset-custom input {
    width: 52px; background: none; border: none; border-bottom: 1px solid rgba(154,146,136,0.12);
    color: var(--text-primary); font-size: 14px; text-align: center; outline: none; padding: 4px 0;
  }

  /* Breathing */
  .breathing-section { margin-bottom: 20px; }
  .breathing-toggle { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; cursor: pointer; }
  .breathing-toggle .label { font-size: 14px; font-weight: 500; color: var(--text-secondary); }
  .toggle-switch {
    width: 44px; height: 26px; background: var(--bg-elevated); border-radius: 13px;
    position: relative; transition: all 0.25s; flex-shrink: 0;
  }
  .toggle-switch::after {
    content: ''; position: absolute; top: 3px; left: 3px; width: 20px; height: 20px;
    background: var(--text-muted); border-radius: 50%; transition: all 0.25s;
  }
  .toggle-switch.on { background: var(--accent-glow); }
  .toggle-switch.on::after { left: 21px; background: var(--accent); }
  .breathing-modes { display: none; gap: 8px; }
  .breathing-modes.visible { display: flex; }
  .breath-mode-btn {
    padding: 8px 16px; font-size: 12px; font-weight: 500; color: var(--text-secondary);
    background: var(--bg-surface); border: 1px solid transparent; border-radius: 8px;
    cursor: pointer; transition: all 0.2s;
  }
  .breath-mode-btn.selected { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

  /* Controls */
  .controls { display: flex; gap: 16px; justify-content: center; margin-bottom: 16px; }
  .btn {
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; font-family: inherit;
  }
  .btn-primary {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(180deg, #d4b36a, #c8a45c 50%, #b08a3e);
    color: #141008; font-size: 30px; line-height: 1;
    box-shadow: 0 1px 0 rgba(255,220,160,.5) inset, 0 2px 0 #c8a45c inset,
                0 14px 28px rgba(160,125,48,.35), 0 4px 10px rgba(120,90,30,.5);
  }
  .btn-primary:active { transform: scale(0.96); }
  .btn-primary.stop {
    background: linear-gradient(180deg, #d49494, #b85a5a 50%, #8b3a3a);
    color: #e5ded5;
    box-shadow: 0 1px 0 rgba(240,180,180,.25) inset, 0 2px 0 #b85a5a inset,
                0 14px 28px rgba(139,58,58,.3), 0 4px 10px rgba(100,40,40,.45);
  }
  .btn-secondary {
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--bg-surface); color: var(--text-secondary); font-size: 18px;
  }
  .btn-secondary:active { transform: scale(0.94); }

  .history-entry {
    text-align: center; padding: 10px; color: var(--text-muted); font-size: 13px; cursor: pointer;
    margin-bottom: 40px;
  }

  /* History Page */
  .back-btn {
    background: var(--bg-surface); border: none; color: var(--text-secondary);
    width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer;
    position: absolute; left: 16px; top: 16px; display: flex; align-items: center; justify-content: center;
  }
  .stats-row { display: flex; gap: 12px; margin: 60px 0 28px; }
  .stat-card {
    flex: 1; background: var(--bg-surface); border-radius: 16px;
    padding: 16px; text-align: center;
  }
  .stat-value { font-size: 28px; font-weight: 500; color: var(--accent); line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 11px; color: var(--text-muted); }
  .session-list { flex: 1; overflow-y: auto; }
  .session-item {
    display: flex; align-items: center; padding: 14px 0; border-bottom: 1px solid rgba(154,146,136,0.08);
  }
  .session-date { flex: 1; font-size: 13px; color: var(--text-secondary); }
  .session-duration { font-size: 16px; font-weight: 500; color: var(--text-primary); margin-right: 12px; }
  .session-mode { font-size: 11px; color: var(--text-muted); background: var(--bg-surface); padding: 3px 10px; border-radius: 20px; }
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--text-muted); gap: 8px; }
  .empty-icon { font-size: 40px; opacity: 0.3; }
  .empty-text { font-size: 14px; }
</style>
</head>
<body>
<div class="app">
  <!-- Timer Page -->
  <div class="page active" id="timerPage">
    <div class="nav"><span class="nav-title">冥 想</span></div>
    <div class="mode-tabs">
      <button class="mode-tab active" id="tabCountdown" onclick="setMode('countdown')">定时</button>
      <button class="mode-tab" id="tabStopwatch" onclick="setMode('stopwatch')">不定时</button>
    </div>
    <div class="ring-container">
      <svg viewBox="0 0 260 260">
        <circle class="ring-track" cx="130" cy="130" r="122"/>
        <circle class="ring-progress" id="ring" cx="130" cy="130" r="122"
          stroke-dasharray="766.5" stroke-dashoffset="0" transform="rotate(-90 130 130)"/>
      </svg>
      <div class="timer-display">
        <div class="timer-time" id="timerTime">05:00</div>
        <div class="timer-label" id="timerLabel">分钟</div>
      </div>
    </div>
    <div class="audio-ind" id="audioInd"><span class="audio-dot"></span><span>颂钵</span></div>
    <div class="preset-section" id="presetSection">
      <div class="preset-row">
        <button class="preset-btn" onclick="setDuration(60)">1 分</button>
        <button class="preset-btn" onclick="setDuration(180)">3 分</button>
        <button class="preset-btn selected" onclick="setDuration(300)">5 分</button>
        <button class="preset-btn" onclick="setDuration(600)">10 分</button>
      </div>
      <div class="preset-row">
        <button class="preset-btn" onclick="setDuration(900)">15 分</button>
        <button class="preset-btn" onclick="setDuration(1200)">20 分</button>
        <button class="preset-btn" onclick="setDuration(1800)">30 分</button>
        <button class="preset-btn" id="customBtn" onclick="toggleCustom()">自定义</button>
      </div>
      <div class="preset-custom" id="customRow">
        <span>自定义</span>
        <input type="number" id="customSec" value="300" min="1" max="7200" onchange="setCustom()">
        <span>秒</span>
      </div>
    </div>
    <div class="breathing-section">
      <div class="breathing-toggle" onclick="toggleBreathing()">
        <div class="toggle-switch" id="breathToggle"></div>
        <span class="label">呼吸引导</span>
      </div>
      <div class="breathing-modes" id="breathModes">
        <button class="breath-mode-btn selected" onclick="setBreathMode('box')">箱式 4-4-4-4</button>
        <button class="breath-mode-btn" onclick="setBreathMode('478')">4-7-8 助眠</button>
      </div>
    </div>
    <div class="controls" id="controls">
      <button class="btn btn-primary" id="btnStart" onclick="startTimer()">▶</button>
    </div>
    <div class="history-entry" onclick="showHistory()">冥想记录 →</div>
  </div>

  <!-- History Page -->
  <div class="page" id="historyPage">
    <button class="back-btn" onclick="showTimer()">←</button>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-value" id="totalSessions">0</div><div class="stat-label">次冥想</div></div>
      <div class="stat-card"><div class="stat-value" id="totalMinutes">0</div><div class="stat-label">分钟</div></div>
      <div class="stat-card"><div class="stat-value" id="currentStreak">0</div><div class="stat-label">天连续</div></div>
    </div>
    <div class="session-list" id="sessionList">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">◯</div><div class="empty-text">暂无冥想记录</div>
        <div style="font-size:12px;color:var(--text-muted)">开始你的第一次冥想吧</div>
      </div>
    </div>
  </div>
</div>

function createAudio(b64) {
  const raw = atob(b64);
  const bytes = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
  return URL.createObjectURL(new Blob([bytes], { type: 'audio/mp3' }));
}

const bowlUrl = createAudio(BOWL_B64);
const cueUrl = createAudio(CUE_B64);

const bowlAudio = new Audio(bowlUrl);
const cueAudio = new Audio(cueUrl);

let bowlFadeTimer = null;
let cueFadeTimer = null;

const BOWL_FADE_DURATION = 26000;
const BOWL_FADE_INTERVAL = 100;
const BOWL_SECOND_STRIKE_START = 6800;
const BOWL_SECOND_STRIKE_END = 8800;
const BOWL_SECOND_STRIKE_GAIN = 0.45;

function _getSecondStrikeGain(elapsed) {
  if (elapsed < BOWL_SECOND_STRIKE_START || elapsed > BOWL_SECOND_STRIKE_END) return 1;
  const progress = (elapsed - BOWL_SECOND_STRIKE_START) / (BOWL_SECOND_STRIKE_END - BOWL_SECOND_STRIKE_START);
  return 1 - (1 - BOWL_SECOND_STRIKE_GAIN) * Math.sin(Math.PI * progress);
}

function _startFade(from, to) {
  clearInterval(bowlFadeTimer);
  const startedAt = Date.now();
  bowlFadeTimer = setInterval(() => {
    const elapsed = Date.now() - startedAt;
    const progress = Math.min(elapsed / BOWL_FADE_DURATION, 1);
    const baseVolume = from + (to - from) * progress;
    const volume = baseVolume * _getSecondStrikeGain(elapsed);
    bowlAudio.volume = Math.max(0, Math.min(1, Math.round(volume * 100) / 100));
    if (progress >= 1) { bowlAudio.volume = to; clearInterval(bowlFadeTimer); }
  }, BOWL_FADE_INTERVAL);
}

function playBowlFadeOut() {
  bowlAudio.volume = 1.0;
  bowlAudio.currentTime = 0;
  bowlAudio.play();
  _startFade(1.0, 0.08);
  flashAudio();
}
function playBowlFadeIn() {
  bowlAudio.volume = 0.08;
  bowlAudio.currentTime = 0;
  bowlAudio.play();
  _startFade(0.08, 1.0);
  flashAudio();
}
function playCue() {
  clearInterval(cueFadeTimer);
  const startVolume = 0.55;
  cueAudio.volume = startVolume;
  cueAudio.currentTime = 0;
  cueAudio.play();
  const steps = 18;
  const stepSize = -startVolume / steps;
  let count = 0;
  cueFadeTimer = setInterval(() => {
    count++;
    if (count >= steps) {
      cueAudio.volume = 0;
      cueAudio.pause();
      clearInterval(cueFadeTimer);
      return;
    }
    cueAudio.volume = Math.max(0, Math.round((startVolume + stepSize * count) * 100) / 100);
  }, 250);
}
function flashAudio() { const el = document.getElementById('audioInd'); el.classList.add('playing'); setTimeout(() => el.classList.remove('playing'), 1500); }

// ── State ──
const RING = 766.5;
let mode = 'countdown', duration = 300, remaining = 300, elapsed = 0;
let running = false, paused = false, startTime = 0, pausedRemaining = 0;
let breathing = false, breathMode = 'box', breathPhase = 0;
let tickTimer = null, breathTimer = null, breathDelayTimer = null;
let sessions = JSON.parse(localStorage.getItem('med_sessions') || '[]');

const BREATH = {
  box: { phases: ['吸气','屏息','呼气','屏息'], dur: [4,4,4,4] },
  '478': { phases: ['吸气','屏息','呼气'], dur: [4,7,8] }
};

function formatDisplayTime(total) {
  const safe = Math.max(0, Math.floor(total));
  const m = Math.floor(safe / 60), s = safe % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function setMode(m) {
  if (running) return; mode = m;
  document.getElementById('tabCountdown').classList.toggle('active', m === 'countdown');
  document.getElementById('tabStopwatch').classList.toggle('active', m === 'stopwatch');
  document.getElementById('presetSection').style.display = m === 'countdown' ? 'block' : 'none';
  if (m === 'countdown') { remaining = duration; } else { elapsed = 0; }
  updateDisplay(); updateRing(m === 'countdown' ? 1 : 0);
}
function setDuration(sec) {
  if (running) return; duration = sec; remaining = sec;
  document.getElementById('customMin').value = Math.round(sec/60);
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('selected'));
  event.target.classList.add('selected');
  updateDisplay(); updateRing(1);
}
function toggleCustom() { document.getElementById('customRow').style.display = document.getElementById('customRow').style.display === 'none' ? 'flex' : 'none'; }
function setCustom() {
  if (running) return;
  let v = parseInt(document.getElementById('customSec').value) || 300;
  v = Math.max(1, Math.min(7200, v));
  document.getElementById('customSec').value = v;
  duration = v; remaining = duration;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('selected'));
  updateDisplay(); updateRing(1);
}
function toggleBreathing() {
  if (running) return; breathing = !breathing;
  document.getElementById('breathToggle').classList.toggle('on', breathing);
  document.getElementById('breathModes').classList.toggle('visible', breathing);
}
function setBreathMode(m) { breathMode = m; document.querySelectorAll('.breath-mode-btn').forEach(b => b.classList.remove('selected')); event.target.classList.add('selected'); }

function getCurrent() {
  const e = Math.floor((Date.now() - startTime) / 1000);
  return mode === 'countdown' ? Math.max(0, duration - e) : e;
}
function getMeditatedSecondsFromSnapshot() {
  if (mode === 'countdown') return Math.max(0, duration - pausedRemaining);
  return Math.max(0, pausedRemaining);
}
function updateDisplay() {
  document.getElementById('timerTime').textContent = formatDisplayTime(mode === 'countdown' ? remaining : elapsed);
}
function updateRing(frac) { document.getElementById('ring').style.strokeDashoffset = RING * (1 - frac); }

function startTimer() {
  if (running && paused) {
    paused = false;
    if (mode === 'countdown') startTime = Date.now() - (duration - pausedRemaining) * 1000;
    else startTime = Date.now() - pausedRemaining * 1000;
    updateControls(); startTick(); if (breathing) startBreath();
    return;
  }
  running = true; paused = false; breathPhase = 0; startTime = Date.now();
  if (mode === 'countdown') remaining = duration; else elapsed = 0;
  updateDisplay(); updateControls();
  playBowlFadeOut(); startTick();
  if (breathing) {
    clearTimeout(breathDelayTimer);
    breathDelayTimer = setTimeout(() => { if (running && !paused) startBreath(); }, 27000);
  }
}
function pauseTimer() {
  if (!running || paused) return;
  paused = true; clearInterval(tickTimer); clearTimeout(breathTimer);
  pausedRemaining = getCurrent(); updateControls();
}
function stopTimer() {
  const wasRunning = running;
  clearInterval(tickTimer); clearTimeout(breathTimer); clearTimeout(breathDelayTimer);
  clearInterval(bowlFadeTimer); clearInterval(cueFadeTimer);
  try { bowlAudio.pause(); bowlAudio.currentTime = 0; } catch(e) {}
  try { cueAudio.pause(); cueAudio.currentTime = 0; } catch(e) {}
  let actualMin = 0;
  if (wasRunning) {
    const e = paused ? getMeditatedSecondsFromSnapshot() : Math.floor((Date.now() - startTime) / 1000);
    actualMin = mode === 'countdown' ? Math.round(Math.min(e, duration) / 6) / 10 : Math.round(e / 6) / 10;
  }
  running = false; paused = false;
  document.getElementById('timerLabel').textContent = mode === 'countdown' ? '分钟' : '已过';
  document.getElementById('timerLabel').className = 'timer-label';
  if (mode === 'countdown') { remaining = duration; updateRing(1); }
  else { elapsed = 0; updateRing(0); }
  updateDisplay(); updateControls();
  if (actualMin > 0.1) recordSession(actualMin);
}
function finish() {
  clearInterval(tickTimer); clearTimeout(breathTimer);
  running = false; paused = false;
  document.getElementById('timerTime').textContent = '00:00';
  document.getElementById('timerLabel').textContent = '分钟';
  document.getElementById('timerLabel').className = 'timer-label';
  updateRing(0); updateControls();
  playBowlFadeIn(); flashAudio();
  recordSession(Math.round(duration / 60 * 10) / 10);
  setTimeout(() => { if (!running) { updateDisplay(); updateRing(1); } }, 2000);
}
function tick() {
  if (paused) return;
  const cur = getCurrent();
  if (mode === 'countdown') { remaining = cur; if (cur <= 0) { finish(); return; } }
  else elapsed = cur;
  updateDisplay();
  updateRing(mode === 'countdown' ? cur/duration : Math.min(cur/7200, 1));
}
function startTick() { clearInterval(tickTimer); tickTimer = setInterval(tick, 250); }
function startBreath() {
  if (!running || paused) return;
  const p = BREATH[breathMode];
  const phase = p.phases[breathPhase];
  document.getElementById('timerLabel').textContent = phase;
  document.getElementById('timerLabel').className = 'timer-label breath';
  if (phase === '吸气') playCue();
  breathTimer = setTimeout(() => { breathPhase = (breathPhase + 1) % p.phases.length; startBreath(); }, p.dur[breathPhase] * 1000);
}
function updateControls() {
  const c = document.getElementById('controls');
  if (!running) c.innerHTML = '<button class="btn btn-primary" onclick="startTimer()">▶</button>';
  else if (paused) c.innerHTML = '<button class="btn btn-secondary" onclick="stopTimer()">■</button><button class="btn btn-primary" onclick="startTimer()">▶</button>';
  else c.innerHTML = '<button class="btn btn-secondary" onclick="pauseTimer()">⏸</button><button class="btn btn-primary stop" onclick="stopTimer()">■</button>';
}

function recordSession(m) {
  const now = new Date();
  sessions.unshift({ date: now.toISOString().split('T')[0], time: now.toTimeString().slice(0,5), duration: m, mode: mode === 'countdown' ? (breathing ? '定时+呼吸' : '定时') : '不定时' });
  if (sessions.length > 100) sessions.length = 100;
  localStorage.setItem('med_sessions', JSON.stringify(sessions));
}
function showHistory() { if (running) return; updateHistory(); document.getElementById('timerPage').classList.remove('active'); document.getElementById('historyPage').classList.add('active'); }
function showTimer() { document.getElementById('historyPage').classList.remove('active'); document.getElementById('timerPage').classList.add('active'); }
function updateHistory() {
  document.getElementById('totalSessions').textContent = sessions.length;
  document.getElementById('totalMinutes').textContent = Math.round(sessions.reduce((s,i) => s + i.duration, 0));
  let streak = 0, today = new Date().toISOString().split('T')[0];
  const dates = [...new Set(sessions.map(s => s.date))].sort().reverse();
  if (dates[0] === today) { streak = 1; for (let i = 1; i < dates.length; i++) { const d = (new Date(dates[i-1]) - new Date(dates[i])) / 86400000; if (Math.abs(d - 1) < 0.1) streak++; else break; } }
  document.getElementById('currentStreak').textContent = streak;
  const list = document.getElementById('sessionList'), empty = document.getElementById('emptyState');
  list.querySelectorAll('.session-item').forEach(e => e.remove());
  if (sessions.length === 0) { empty.style.display = 'flex'; return; }
  empty.style.display = 'none';
  sessions.slice(0, 30).forEach(s => {
    const d = document.createElement('div'); d.className = 'session-item';
    d.innerHTML = `<span class="session-date">${s.date} ${s.time}</span><span class="session-duration">${s.duration} 分钟</span><span class="session-mode">${s.mode}</span>`;
    list.appendChild(d);
  });
}

// Init
document.getElementById('customRow').style.display = 'none';
</script>
</body>
